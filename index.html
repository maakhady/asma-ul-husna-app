function loadProgress(){
  try{ return JSON.parse(localStorage.getItem('asma_app_progress')) || { completedDays: 0 }; }
  catch(e){ return { completedDays: 0 }; }
}
function saveProgress(p){ try{ localStorage.setItem('asma_app_progress', JSON.stringify(p)); }catch(e){} }

// ---------- Claude API helper ----------
async function askClaude(systemPrompt, userPrompt){
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1000,
      system: systemPrompt,
      messages:[{ role:"user", content:userPrompt }]
    })
  });
  const data = await res.json();
  const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  const clean = text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

  const usr = `Nom du jour : ${name.a} (${name.t}), signifiant "${name.f}". 
- "explication": présente le sens spirituel de ce nom et, si pertinent, sa place dans le Coran ou la Sunna.
- "comprendre": synthétise en points clés ce qu'il faut retenir de ce nom.
- "pourquoi": une réflexion personnelle sur pourquoi ce nom peut résonner dans une vie quotidienne, aujourd'hui.`;
  try{
    return await askClaude(sys, usr);
  }catch(e){
    return { explication: name.r, comprendre: `Point clé à retenir : ${name.f}.`, pourquoi: "Prenez un moment pour méditer sur ce nom dans votre journée." };
  }
}

async function generateRecap(name, lesson){
  const sys = "Tu génères un mini-quiz de récapitulatif. Réponds UNIQUEMENT en JSON valide, sans texte autour, format: {\"questions\":[{\"q\":\"...\",\"options\":[\"...\",\"...\",\"...\",\"...\"],\"correct\":0}]}. Génère exactement 3 questions courtes, en français, basées sur le contenu fourni, avec 4 options chacune (une seule correcte).";
  const usr = `Nom : ${name.a} (${name.t}) — ${name.f}.\nExplication : ${lesson.explication}\nÀ comprendre : ${lesson.comprendre}`;
  try{
    return await askClaude(sys, usr);
  }catch(e){
    return { questions: [{ q: `Que signifie ${name.t} ?`, options: [name.f, "Le Créateur des mondes", "Le Souverain", "Le Témoin"], correct: 0 }] };
  }
}

// ---------- rendering ----------
function updateHeader(){
  document.getElementById('progressBar').style.width = ((viewingDay+1)/NAMES.length*100).toFixed(1) + '%';
  document.getElementById('progressLabel').textContent = `Jour ${viewingDay+1} / ${NAMES.length}` + (isReviewMode() ? ' · révision' : '');
  document.getElementById('prevDayBtn').disabled = viewingDay <= 0;
  document.getElementById('nextDayBtn').disabled = viewingDay >= progress.completedDays || viewingDay >= maxDay;
  document.getElementById('todayBtn').style.display = isReviewMode() ? 'inline-block' : 'none';
}

function renderIntro(){
  const n = NAMES[viewingDay];
  app.innerHTML = `
    <div class="card center">
      <div class="star-frame">
        <svg viewBox="0 0 150 150"><polygon points="75,8 88,46 125,46 95,68 106,107 75,85 44,107 55,68 25,46 62,46" fill="none" stroke="#C9A66B" stroke-width="1.2" opacity="0.55"/></svg>
        <div class="core"><div class="day-arabic">${n.a}</div><div class="day-translit">${n.t}</div></div>
      </div>
      <div class="day-meaning">${n.f}</div>
      ${isReviewMode()
        ? `<div class="section-body" style="margin-top:10px;">${n.r}</div>`
        : `<div class="btn-row"><button class="btn" id="startBtn">Commencer la session (15-20 min)</button></div>`
      }
    </div>
  `;
  if(!isReviewMode()){
    document.getElementById('startBtn').addEventListener('click', startLesson);
  }
}

async function startLesson(){
  stage = 'lesson';
  app.innerHTML = `<div class="card"><div class="loading">L'explication du nom se prépare<span class="dot-anim"></span></div></div>`;
  const n = NAMES[viewingDay];
  lessonData = await generateLesson(n);
  renderLesson();
}

let lessonStep = 0; // 0 explication, 1 comprendre, 2 pourquoi
function renderLesson(){
  const n = NAMES[viewingDay];
  const steps = [
    { title:"L'explication du nom", body: lessonData.explication },
    { title:"Que dois-je comprendre ?", body: lessonData.comprendre },
    { title:"Pourquoi ce nom, pourquoi maintenant ?", body: lessonData.pourquoi }
  ];
  const s = steps[lessonStep];
  app.innerHTML = `
    <div class="card">
      <div class="section-title">${n.t} · ${s.title}</div>
      <div class="section-body">${s.body}</div>
      <div class="btn-row">
        ${lessonStep < 2 ? `<button class="btn" id="lessonNextBtn">Suite</button>` : `<button class="btn" id="toGameBtn">Passer au jeu memory</button>`}
      </div>
    </div>
  `;
  if(lessonStep < 2){
    document.getElementById('lessonNextBtn').addEventListener('click', () => { lessonStep++; renderLesson(); });
  } else {
    document.getElementById('toGameBtn').addEventListener('click', () => { lessonStep = 0; startGame(); });
  }
}

// ---------- memory game ----------
function startGame(){
  stage = 'game';
  const others = [];
  const pool = NAMES.filter((_, i) => i !== viewingDay);
  while(others.length < 5){
    const r = pool[Math.floor(Math.random()*pool.length)];
    if(!others.includes(r)) others.push(r);
  }
  const set = [NAMES[viewingDay], ...others];
  let cards = [];
  set.forEach((n, i) => {
    cards.push({ id:i, type:'a', label:n.a, matchKey:i });
    cards.push({ id:i, type:'f', label:n.f, matchKey:i });
  });
  cards = cards.sort(() => Math.random()-0.5);

  let flipped = [];
  let matchedCount = 0;
  let locked = false;

  function render(){
    app.innerHTML = `
      <div class="card">
        <div class="section-title">Jeu memory · relie le nom à son sens</div>
        <div class="memory-grid" id="memGrid"></div>
        <div class="mem-status" id="memStatus">${matchedCount} / ${set.length} paires trouvées</div>
      </div>
    `;
    const grid = document.getElementById('memGrid');
    cards.forEach((c, idx) => {
      const el = document.createElement('div');
      const isFlipped = flipped.includes(idx) || c.matched;
      el.className = 'mem-card' + (c.type==='a' ? ' arabic' : '') + (isFlipped ? ' flipped' : '') + (c.matched ? ' matched' : '');
      el.textContent = isFlipped ? c.label : '?';
      el.addEventListener('click', () => handleFlip(idx));
      grid.appendChild(el);
    });
    if(matchedCount === set.length){
      const div = document.createElement('div');
      div.className = 'btn-row';
      div.innerHTML = `<button class="btn" id="toRecapBtn">Passer au récap</button>`;
      document.querySelector('.card').appendChild(div);
      document.getElementById('toRecapBtn').addEventListener('click', startRecap);
    }
  }

  function handleFlip(idx){
    if(locked || cards[idx].matched || flipped.includes(idx)) return;
    flipped.push(idx);
    render();
    if(flipped.length === 2){
      locked = true;
      const [i1, i2] = flipped;
      if(cards[i1].matchKey === cards[i2].matchKey && cards[i1].type !== cards[i2].type){
        cards[i1].matched = true; cards[i2].matched = true;
        matchedCount++;
        flipped = []; locked = false;
        render();
      } else {
        setTimeout(() => { flipped = []; locked = false; render(); }, 700);
      }
    }
  }
  render();
}

// ---------- recap ----------
async function startRecap(){
  stage = 'recap';
  app.innerHTML = `<div class="card"><div class="loading">Préparation du récap<span class="dot-anim"></span></div></div>`;
  const n = NAMES[viewingDay];
  quizData = await generateRecap(n, lessonData);
  renderRecap();
}

function renderRecap(){
  const n = NAMES[viewingDay];
  let html = `<div class="card"><div class="section-title">Récap express · ${n.t}</div>`;
  quizData.questions.forEach((q, qi) => {
    html += `<div class="quiz-block" data-qi="${qi}"><div class="quiz-q">${q.q}</div>`;
    q.options.forEach((opt, oi) => {
      html += `<div class="quiz-opt" data-qi="${qi}" data-oi="${oi}">${opt}</div>`;
    });
    html += `</div>`;
  });
  html += `<div class="btn-row"><button class="btn" id="toCardBtn" disabled>Voir la fiche du jour</button></div></div>`;
  app.innerHTML = html;

  let answered = 0;
  document.querySelectorAll('.quiz-opt').forEach(el => {
    el.addEventListener('click', () => {
      const qi = +el.dataset.qi, oi = +el.dataset.oi;
      const block = document.querySelector(`.quiz-block[data-qi="${qi}"]`);
      if(block.dataset.done) return;
      block.dataset.done = '1';
      answered++;
      const correct = quizData.questions[qi].correct;
      block.querySelectorAll('.quiz-opt').forEach(o => {
        const ooi = +o.dataset.oi;
        if(ooi === correct) o.classList.add('correct');
        else if(ooi === oi) o.classList.add('wrong');
      });
      if(answered === quizData.questions.length){
        document.getElementById('toCardBtn').disabled = false;
      }
    });
  });
  document.getElementById('toCardBtn').addEventListener('click', showCard);
}

// ---------- daily card export ----------
function showCard(){
  stage = 'card';
  const n = NAMES[viewingDay];
  app.innerHTML = `
    <div class="card center">
      <div class="section-title">Fiche du jour</div>
      <img id="cardPreview" alt="Fiche du jour" />
      <div class="btn-row">
        <a class="btn" id="downloadBtn" download="asma-jour-${viewingDay+1}-${n.t}.png">Télécharger la fiche</a>
        <button class="btn secondary" id="finishBtn">Terminer la session</button>
      </div>
    </div>
  `;
  drawCard(n).then(dataUrl => {
    document.getElementById('cardPreview').src = dataUrl;
    document.getElementById('downloadBtn').href = dataUrl;
  });
  document.getElementById('finishBtn').addEventListener('click', finishSession);
}

async function drawCard(n){
  try{ await document.fonts.load("60px Amiri"); await document.fonts.load("italic 30px Fraunces"); await document.fonts.load("600 22px Fraunces"); await document.fonts.load("15px Inter"); }catch(e){}
  const canvas = document.getElementById('cardCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#16213A'); grad.addColorStop(1, '#0B1220');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  ctx.strokeStyle = 'rgba(201,166,107,0.5)'; ctx.lineWidth = 3;
  ctx.strokeRect(28,28,W-56,H-56);

  ctx.fillStyle = '#C9A66B';
  ctx.font = "13px Inter"; ctx.textAlign = 'center';
  ctx.fillText(`ASMA-UL-HUSNA · JOUR ${viewingDay+1} / ${NAMES.length}`, W/2, 90);

  ctx.font = "80px Amiri"; ctx.fillStyle = '#C9A66B';
  ctx.fillText(n.a, W/2, 210);

  ctx.font = "24px Inter"; ctx.fillStyle = '#F2EDE3';
  ctx.fillText(n.t, W/2, 250);

  ctx.font = "italic 600 32px Fraunces"; ctx.fillStyle = '#F2EDE3';
  wrapText(ctx, n.f, W/2, 310, W-160, 40, true);

  ctx.font = "600 18px Fraunces"; ctx.fillStyle = '#C9A66B'; ctx.textAlign='left';
  ctx.fillText("Point clé à retenir", 80, 420);
  ctx.font = "16px Inter"; ctx.fillStyle = '#F2EDE3';
  wrapText(ctx, lessonData ? lessonData.comprendre : n.r, 80, 455, W-160, 26, false);

  ctx.font = "13px Inter"; ctx.fillStyle = '#8B94A7'; ctx.textAlign='center';
  ctx.fillText("Un nom à la fois, pas à pas 🌙", W/2, H-60);

  return canvas.toDataURL('image/png');
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight, centered){
  const words = text.split(' ');
  let line = '';
  let lines = [];
  words.forEach(w => {
    const test = line + w + ' ';
    if(ctx.measureText(test).width > maxWidth && line !== ''){
      lines.push(line); line = w + ' ';
    } else { line = test; }
  });
  lines.push(line);
  ctx.textAlign = centered ? 'center' : 'left';
  lines.forEach((l, i) => ctx.fillText(l.trim(), x, y + i*lineHeight));
}

function finishSession(){
  if(viewingDay === progress.completedDays && progress.completedDays < NAMES.length){
    progress.completedDays++;
    saveProgress(progress);
  }
  viewingDay = Math.min(progress.completedDays, maxDay);
  stage = 'intro';
  lessonData = null; quizData = null;
  updateHeader();
  renderIntro();
}

// ---------- day navigation ----------
document.getElementById('prevDayBtn').addEventListener('click', () => {
  if(viewingDay > 0){ viewingDay--; stage='intro'; lessonData=null; quizData=null; updateHeader(); renderIntro(); }
});
document.getElementById('nextDayBtn').addEventListener('click', () => {
  if(viewingDay < progress.completedDays && viewingDay < maxDay){ viewingDay++; stage='intro'; lessonData=null; quizData=null; updateHeader(); renderIntro(); }
});
document.getElementById('todayBtn').addEventListener('click', () => {
  viewingDay = Math.min(progress.completedDays, maxDay); stage='intro'; lessonData=null; quizData=null; updateHeader(); renderIntro();
});

// ---------- init ----------
updateHeader();
renderIntro();
</script>
